<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MazeDash</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070b14;
      --panel: rgba(11, 18, 32, 0.88);
      --text: #f3f7ff;
      --muted: #9fb0c8;
      --cyan: #00d4ff;
      --pink: #ff2d9a;
      --line: rgba(0, 212, 255, 0.16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(0, 212, 255, 0.12), transparent 36%),
        radial-gradient(circle at 85% 12%, rgba(255, 45, 154, 0.08), transparent 24%),
        linear-gradient(180deg, #070b14 0%, #090f1c 48%, #05070d 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
    }

    main {
      width: min(860px, 100%);
      padding: 32px 28px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.34);
    }

    .tag {
      display: inline-block;
      margin-bottom: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.18);
      color: var(--cyan);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(34px, 6vw, 52px);
      letter-spacing: 0.04em;
      line-height: 1.05;
    }

    p {
      color: var(--muted);
      font-size: 17px;
      line-height: 1.6;
      margin: 0 0 16px;
    }

    nav {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    a {
      display: block;
      padding: 14px 16px;
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      border: 1px solid rgba(0, 212, 255, 0.14);
      background: rgba(255, 255, 255, 0.02);
    }

    a strong {
      display: block;
      margin-bottom: 4px;
      color: var(--cyan);
      font-size: 15px;
      letter-spacing: 0.06em;
    }

    a span {
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <div class="tag">MazeDash</div>
    <h1>MazeDash Support Hub</h1>
    <p>Public support and compliance files for MazeDash Time Run.</p>
    <nav>
      <a href="/support.html">
        <strong>SUPPORT</strong>
        <span>Player help and support contact details.</span>
      </a>
      <a href="/privacy-policy.html">
        <strong>PRIVACY POLICY</strong>
        <span>Current privacy policy for the iOS app.</span>
      </a>
      <a href="/app-ads.txt">
        <strong>APP-ADS.TXT</strong>
        <span>Authorized sellers file for app advertising.</span>
      </a>
    </nav>
  </main>
</body>
</html>
